<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mines Corps</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js@2.0.0/dist/break_infinity.min.js"></script>
</head>
<body>
<!-- Boutons flottants -->
<div class="floating-buttons">
    <button id="saveFloatingBtn" title="Sauvegarde">💾</button>
    <button id="achievementsFloatingBtn" title="Succès">🏆</button>
    <button id="costTableFloatingBtn" title="gear">⚙️</button>
</div>
<div id="saveOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <button class="close-btn" id="closeOverlayBtn">&times;</button>
        <h3>Sauvegarde</h3>
        <div class="save-buttons">
            <button id="saveBtn">Sauvegarder</button>
            <button id="loadBtn">Charger</button>
            <button id="exportBtn">Exporter</button>
            <button id="importBtn">Importer</button>
            <button id="resetBtn">Réinitialiser</button>
        </div>
        <input type="file" id="importFile" accept=".json" style="display: none;">
        <div class="save-info" id="saveInfo"></div>
    </div>
</div>
<div id="achievementsOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <button class="close-btn" id="closeAchievementsBtn">&times;</button>
        <h3>🏆 Succès</h3>
        <div>Points de succès : <span id="achievementPointsDisplay">0</span></div>
        <div class="achievements-list" id="achievementsList"></div>
        <div class="achievement-shop" id="achievementShop">
            <h4>Boutique (à venir)</h4>
            <p>Les points de succès pourront être dépensés ici.</p>
        </div>
    </div>
</div>
<div id="costTableOverlay" class="overlay" style="display: none;">
    <div class="overlay-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
        <button class="close-btn" id="closeCostTableBtn">&times;</button>
        <h3></h3>
        <div id="costTableContent"></div>
    </div>
</div>
<!-- Fin boutons flottants -->

<div id="game-container">
    <!-- Ressources (toujours visibles) -->
    <div id="resources-bar"></div>

    <!-- Onglets -->
    <div id="tabs">
        <button class="tab-btn active" data-tab="tab-basic" id="tab-btn-basic">Mines de base</button>
        <button class="tab-btn" data-tab="tab-energy" id="tab-btn-energy">Énergie & Deutérium</button>
        <button class="tab-btn" data-tab="tab-titanite" id="tab-btn-titanite">Titanite & Automatisation</button>
    </div>

    <!-- Contenu des onglets -->
    <div id="tab-content">
        <div class="tab-panel active" id="tab-basic"></div>
        <div class="tab-panel" id="tab-energy"></div>
        <div class="tab-panel" id="tab-titanite"></div>
    </div>
</div>
<script src="achievements.js"></script>
<script src="game-state.js"></script>
<script src="upgrades.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

<div id="toast-container"></div>

</body>
</html>

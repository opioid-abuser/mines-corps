<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mines Corps</title>
    <link href="style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/break_infinity.js@2.0.0/dist/break_infinity.min.js"></script>
</head>
<body>
<!-- Boutons flottants -->
<div class="floating-buttons">
    <button id="saveFloatingBtn" title="Save">💾</button>
    <button id="achievementsFloatingBtn" title="Achievements">🏆</button>
    <button id="costTableFloatingBtn" title="gear">⚙️</button>
</div>
<div class="overlay" id="saveOverlay" style="display: none;">
    <div class="overlay-content">
        <button class="close-btn" id="closeOverlayBtn">&times;</button>
        <div class="save-buttons">
            <button id="saveBtn">Save</button>
            <button id="exportBtn">Export</button>
            <button id="importBtn">Import</button>
            <button id="resetBtn">!! Reset Save !!</button>
        </div>
        <input accept=".json" id="importFile" style="display: none;" type="file">
        <div class="save-info" id="saveInfo"></div>
        <div class="notation-selector">
            <span>Number Notation :</span>
            <label><input checked name="notation" type="radio" value="standard"> standard (k, M, G)</label>
            <label><input name="notation" type="radio" value="scientific"> scientific (1.23e6)</label>
        </div>
    </div>
</div>
<div class="overlay" id="achievementsOverlay" style="display: none;">
    <div class="overlay-content">
        <button class="close-btn" id="closeAchievementsBtn">&times;</button>
        <h3>🏆 Achievements</h3>
        <div>Achievements points : <span id="achievementPointsDisplay">0</span></div>
        <div class="achievements-list" id="achievementsList"></div>
        <div class="achievement-shop" id="achievementShop">
            <h4>Shop (TBC)</h4>
            <p>Success points can be spent here.</p>
        </div>
    </div>
</div>
<div class="overlay" id="costTableOverlay" style="display: none;">
    <div class="overlay-content" style="max-width: 800px; max-height: 80vh; overflow-y: auto;">
        <button class="close-btn" id="closeCostTableBtn">&times;</button>
        <h3></h3>
        <div id="costTableContent"></div>
    </div>
</div>
<!-- Fin boutons flottants -->

<div id="game-container">
    <!-- Ressources (toujours visibles) -->
    <div id="resources-bar"></div>

    <!-- Onglets -->
    <div id="tabs">
        <button class="tab-btn active" data-tab="tab-basic" id="tab-btn-basic">Standard Mines</button>
        <button class="tab-btn" data-tab="tab-energy" id="tab-btn-energy">Deuterium & Energy</button>
        <button class="tab-btn" data-tab="tab-titanite" id="tab-btn-titanite">Titanite & Automation</button>
        <button class="tab-btn" data-tab="tab-nanite" id="tab-btn-nanite" style="display:none;">Nanite</button>
    </div>

    <!-- Contenu des onglets -->
    <div id="tab-content">
        <div class="tab-panel active" id="tab-basic"></div>
        <div class="tab-panel" id="tab-energy"></div>
        <div class="tab-panel" id="tab-titanite"></div>
        <div class="tab-panel" id="tab-nanite"></div>
    </div>
</div>
<script src="achievements.js"></script>
<script src="game-state.js"></script>
<script src="upgrades.js"></script>
<script src="ui.js"></script>
<script src="main.js"></script>

<div id="toast-container"></div>
<footer id="game-footer"></footer>

</body>
</html>
